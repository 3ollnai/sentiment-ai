version: "3.9"

services:
  sentiment-ai:
    build: .
    image: sentiment-ai:latest
    container_name: sentiment-staging
    ports:
      - "8001:8000"
    environment:
      - ENV=staging
    networks:
      - cicd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  cicd-network:
    external: true